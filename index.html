<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دار الحكمة للقرآن والدعوة - نموذج التسجيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .center-brand {
            font-family: 'Amiri', serif;
            color: #2d3748;
        }
        .form-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 750px;
            overflow: hidden;
            position: relative;
            border: 1px solid #f1f5f9;
        }
        .category-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #f8fafc;
        }
        .category-card:hover {
            transform: translateY(-10px);
            border-color: #667eea;
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.1);
        }
        .custom-input {
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
            border-radius: 0.75rem;
        }
        .custom-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        .section-header {
            border-right: 4px solid #667eea;
            padding-right: 12px;
            color: #4a5568;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .btn-submit {
            background: linear-gradient(to left, #667eea, #764ba2);
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #f8fafc;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
    </style>
</head>
<body>

<div class="form-card">
    <!-- زر العودة -->
    <button id="backBtn" onclick="resetForm()" class="hidden absolute top-6 right-6 text-gray-400 hover:text-indigo-600 flex items-center gap-2 text-sm font-bold bg-gray-50 px-4 py-2 rounded-full transition-all z-20">
        <span>&rarr;</span> تغيير الفئة
    </button>

    <!-- شاشة الاختيار -->
    <div id="selectionArea" class="p-12 text-center">
        <div class="mb-12">
            <h1 class="center-brand text-4xl font-bold mb-4">دار الحكمة للقرآن والدعوة</h1>
            <div class="w-20 h-1 bg-indigo-500 mx-auto rounded-full mb-6"></div>
            <p class="text-gray-500 text-lg">يرجى اختيار الفئة لبدء التسجيل</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <button onclick="startApp('طالبات')" class="category-card p-10 rounded-3xl bg-white group flex flex-col items-center">
                <div class="icon-box mb-6 text-indigo-500">📖</div>
                <span class="text-2xl font-bold text-gray-700">فئة الطالبات</span>
            </button>
            <button onclick="startApp('سيدات')" class="category-card p-10 rounded-3xl bg-white group flex flex-col items-center">
                <div class="icon-box mb-6 text-purple-500">🕌</div>
                <span class="text-2xl font-bold text-gray-700">فئة السيدات</span>
            </button>
        </div>
    </div>

    <!-- النموذج الرئيسي -->
    <form id="mainForm" class="hidden p-8 md:p-12 space-y-8">
        <input type="hidden" name="userCategory" id="categoryInput">
        
        <div class="text-center mb-10">
            <h2 class="center-brand text-3xl font-bold text-indigo-900 mb-2">استمارة التسجيل</h2>
            <div id="displayCategory" class="inline-block px-4 py-1 bg-indigo-50 text-indigo-700 rounded-full font-bold text-sm"></div>
        </div>

        <section>
            <h3 class="section-header">أولاً: البيانات الشخصية</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">الاسم الثلاثي</label>
                    <input type="text" name="fullName" required class="custom-input w-full p-4">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">الجنسية</label>
                    <input type="text" name="nationality" required class="custom-input w-full p-4">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">تاريخ الميلاد</label>
                    <input type="date" name="birthDate" required class="custom-input w-full p-4">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">الرقم الشخصي (11 رقم)</label>
                    <input type="text" name="idNumber" id="idNum" maxlength="11" required class="custom-input w-full p-4">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">منطقة السكن</label>
                    <input type="text" name="residentialArea" required class="custom-input w-full p-4">
                </div>
            </div>
        </section>

        <section id="extraSection">
            <h3 class="section-header" id="extraHeader">ثانياً: البيانات الدراسية</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div id="studentFields" class="contents">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">اسم المدرسة</label>
                        <input type="text" name="schoolName" id="schoolField" class="custom-input w-full p-4">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">الصف الدراسي</label>
                        <input type="text" name="grade" id="gradeField" class="custom-input w-full p-4">
                    </div>
                </div>
                <div id="ladyFields" class="contents hidden">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">التخصص العلمي / المهنة</label>
                        <input type="text" name="scientificMajor" id="majorField" class="custom-input w-full p-4">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">الفئة العمرية</label>
                        <input type="text" name="ageRange" id="ageField" class="custom-input w-full p-4">
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h3 class="section-header">ثالثاً: بيانات التواصل</h3>
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label id="phoneLabel" class="block text-sm font-bold text-gray-700 mb-2">رقم هاتف الأم</label>
                        <input type="tel" name="phone" required class="custom-input w-full p-4">
                    </div>
                    <div>
                        <label id="whatsappLabel" class="block text-sm font-bold text-gray-700 mb-2">رقم واتساب الأم</label>
                        <input type="tel" name="whatsapp" required class="custom-input w-full p-4">
                    </div>
                </div>
                <div id="childOnlyContacts" class="space-y-5 bg-gray-50 p-6 rounded-xl">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">رقم هاتف الأب</label>
                        <input type="tel" name="fatherPhone" id="fatherPhoneField" class="custom-input w-full p-4">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-4 border-t border-gray-200">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">رقم تواصل آخر</label>
                            <input type="tel" name="otherContactPhone" class="custom-input w-full p-4">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">صلة القرابة للرقم الآخر</label>
                            <input type="text" name="otherContactRelation" class="custom-input w-full p-4">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h3 class="section-header">رابعاً: التسجيل في الحلقات</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                <label class="flex items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer hover:bg-indigo-50">
                    <input type="radio" name="classCategory" value="حلقة مبتدئات" required onchange="toggleRetention(false)">
                    <span class="mr-3 font-bold">حلقة مبتدئات</span>
                </label>
                <label class="flex items-center p-4 border-2 border-gray-50 rounded-2xl cursor-pointer hover:bg-indigo-50">
                    <input type="radio" name="classCategory" value="حلقة استكمال حفظ" onchange="toggleRetention(true)">
                    <span class="mr-3 font-bold">حلقة استكمال حفظ</span>
                </label>
            </div>
            <div id="retentionBox" class="hidden bg-indigo-50 p-6 rounded-2xl">
                <label class="block text-sm font-bold text-indigo-900 mb-2">مقدار الحفظ الحالي</label>
                <textarea name="currentRetentionAmount" id="retentionInput" class="custom-input w-full p-4 h-24"></textarea>
            </div>
        </section>

        <button type="submit" id="submitBtn" class="btn-submit w-full text-white font-bold py-5 rounded-2xl shadow-xl text-xl">
            إرسال طلب التسجيل
        </button>
    </form>

    <div id="successMsg" class="hidden p-20 text-center">
        <div class="text-6xl mb-8">✅</div>
        <h2 class="center-brand text-3xl font-bold mb-4">تم الإرسال بنجاح</h2>
        <button onclick="resetForm()" class="text-indigo-600 font-bold underline">إرسال طلب جديد</button>
    </div>
</div>

<script>
    // الرابط الخاص بـ Web App
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVHLDmM3P79vFum20NcueD1qLdv3m_GuvDs7OGjNquLqhR_ofli0sl9n3RJdKOE57N/exec';

    function startApp(cat) {
        document.getElementById('selectionArea').classList.add('hidden');
        document.getElementById('mainForm').classList.remove('hidden');
        document.getElementById('backBtn').classList.remove('hidden');
        document.getElementById('categoryInput').value = cat;
        document.getElementById('displayCategory').innerText = "فئة " + cat;

        const isLady = (cat === 'سيدات');
        document.getElementById('studentFields').classList.toggle('hidden', isLady);
        document.getElementById('ladyFields').classList.toggle('hidden', !isLady);
        document.getElementById('childOnlyContacts').classList.toggle('hidden', isLady);
        
        document.getElementById('extraHeader').innerText = isLady ? "ثانياً: البيانات العلمية" : "ثانياً: البيانات الدراسية";
        document.getElementById('phoneLabel').innerText = isLady ? "رقم الهاتف الشخصي" : "رقم هاتف الأم";
        document.getElementById('whatsappLabel').innerText = isLady ? "رقم واتساب الشخصي" : "رقم واتساب الأم";

        document.getElementById('schoolField').required = !isLady;
        document.getElementById('gradeField').required = !isLady;
        document.getElementById('fatherPhoneField').required = !isLady;
        document.getElementById('majorField').required = isLady;
        document.getElementById('ageField').required = isLady;
    }

    function toggleRetention(show) {
        document.getElementById('retentionBox').classList.toggle('hidden', !show);
        document.getElementById('retentionInput').required = show;
    }

    function resetForm() {
        location.reload();
    }

    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> جاري الإرسال...';

        // إرسال البيانات باستخدام FormData
        const formData = new FormData(this);

        // استخدام fetch مع تعديل المعالجة لضمان النجاح حتى في حالات CORS البسيطة
        fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: formData,
            mode: 'no-cors' // تجنب مشاكل CORS في المتصفح عند الإرسال لـ Google Apps Script
        })
        .then(() => {
            // في وضع no-cors لا يمكننا قراءة الرد، لذا نفترض النجاح إذا لم يحدث خطأ في الشبكة
            document.getElementById('mainForm').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            document.getElementById('successMsg').classList.remove('hidden');
            window.scrollTo(0,0);
        })
        .catch((error) => {
            console.error('Error:', error);
            alert("حدث خطأ أثناء الإرسال. يرجى التأكد من اتصال الإنترنت أو المحاولة لاحقاً.");
            btn.disabled = false;
            btn.innerText = "إرسال طلب التسجيل";
        });
    });

    document.getElementById('idNum').addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>

</body>
</html>
